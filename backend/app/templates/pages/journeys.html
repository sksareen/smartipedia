{% extends "base.html" %}

{% block title %}My Journeys — Smartipedia{% endblock %}

{% block content %}
<div class="journeys-page">
    <div class="journeys-header">
        <h1>My Journeys</h1>
        <p class="journeys-subtitle">Your exploration paths through knowledge</p>
        <button class="journeys-clear-btn" id="clear-journeys">Clear all</button>
    </div>
    <div class="journeys-list" id="journeys-list">
        <p class="journeys-empty">No journeys yet. Start exploring a topic and your path will be tracked here.</p>
    </div>
</div>

<script>
(function() {
    var JOURNEY_KEY = 'smartipedia-journeys';
    var container = document.getElementById('journeys-list');
    var clearBtn = document.getElementById('clear-journeys');

    function getJourneys() {
        try { return JSON.parse(localStorage.getItem(JOURNEY_KEY)) || []; }
        catch (e) { return []; }
    }

    function escHtml(str) {
        var div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function renderJourneys() {
        var journeys = getJourneys();
        if (!journeys.length) {
            container.innerHTML = '<p class="journeys-empty">No journeys yet. Start exploring a topic and your path will be tracked here.</p>';
            clearBtn.style.display = 'none';
            return;
        }

        clearBtn.style.display = 'inline-block';
        // Sort newest first
        journeys.sort(function(a, b) {
            return new Date(b.updatedAt) - new Date(a.updatedAt);
        });

        var html = '';
        journeys.forEach(function(journey, ji) {
            if (!journey.nodes || !journey.nodes.length) return;

            var rootNodes = journey.nodes.filter(function(n) { return !n.parentId; });
            // If no root found, treat the first node as root
            if (!rootNodes.length) rootNodes = [journey.nodes[0]];

            var startTitle = rootNodes[0].title || 'Unknown';
            var nodeCount = journey.nodes.length;
            var date = new Date(journey.startedAt || journey.updatedAt);
            var dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

            html += '<div class="journey-card">';
            html += '<div class="journey-card-header">';
            html += '<h3>' + escHtml(startTitle) + '</h3>';
            html += '<span class="journey-card-meta">' + nodeCount + ' topic' + (nodeCount !== 1 ? 's' : '') + ' explored &middot; ' + dateStr + '</span>';
            html += '</div>';
            // Continue button — resume this journey from the last visited node
            var lastNode = journey.nodes[journey.nodes.length - 1];
            html += '<a href="/topic/' + escHtml(lastNode.slug) + '" class="journey-continue-btn" data-journey-id="' + escHtml(journey.id) + '" data-last-slug="' + escHtml(lastNode.slug) + '" data-last-node="' + escHtml(lastNode.id) + '">Continue &rarr;</a>';
            html += '<div class="journey-tree">';

            // Build tree from all root nodes
            var rendered = {};
            rootNodes.forEach(function(root) {
                html += renderNode(journey.nodes, root, 0, rendered);
            });

            // Render orphan nodes (parentId set but parent not found)
            journey.nodes.forEach(function(n) {
                if (!rendered[n.id]) {
                    html += renderNode(journey.nodes, n, 0, rendered);
                }
            });

            html += '</div>';
            html += '</div>';
        });

        container.innerHTML = html;
    }

    function renderNode(allNodes, node, depth, rendered) {
        if (!node || rendered[node.id]) return '';
        rendered[node.id] = true;

        var indent = depth * 24;
        var html = '<div class="journey-tree-node" style="padding-left:' + indent + 'px">';
        if (depth > 0) {
            html += '<span class="journey-tree-branch">&#9492;&#9472; </span>';
        }
        html += '<a href="/topic/' + escHtml(node.slug) + '" class="journey-tree-link">' + escHtml(node.title) + '</a>';
        html += '</div>';

        // Find and render children
        var children = allNodes.filter(function(n) { return n.parentId === node.id; });
        children.forEach(function(child) {
            html += renderNode(allNodes, child, depth + 1, rendered);
        });

        return html;
    }

    // Continue journey buttons — set session state so the journey resumes
    container.addEventListener('click', function(e) {
        var btn = e.target.closest('.journey-continue-btn');
        if (!btn) return;
        e.preventDefault();
        sessionStorage.setItem('smartipedia-current-journey', btn.dataset.journeyId);
        sessionStorage.setItem('smartipedia-last-slug', btn.dataset.lastSlug);
        sessionStorage.setItem('smartipedia-last-node', btn.dataset.lastNode);
        window.location.href = btn.href;
    });

    clearBtn.addEventListener('click', function() {
        if (confirm('Clear all journey history?')) {
            localStorage.removeItem(JOURNEY_KEY);
            sessionStorage.removeItem('smartipedia-current-journey');
            renderJourneys();
        }
    });

    renderJourneys();
})();
</script>
{% endblock %}
