{% extends "base.html" %}

{% block title %}Topic Not Found — Smartipedia{% endblock %}

{% block content %}
<section class="not-found">
    <h1>Topic not found</h1>
    <p>This topic doesn't exist yet. Want to create it?</p>
    <form action="/generate" method="post" class="hero-search">
        <input type="text" name="title" value="{{ slug.replace('-', ' ').title() }}" required>
        <button type="submit">Generate</button>
    </form>
</section>
{% endblock %}
