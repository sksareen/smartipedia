{% extends "base.html" %}

{% block title %}Generating {{ title }} — Smartipedia{% endblock %}

{% block content %}
<div class="generating-page">
    <div class="generating-card">
        <div class="generating-icon">
            <div class="generating-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
        <h1>{{ title }}</h1>
        <p class="generating-subtitle">Researching and writing this article...</p>

        <div class="generating-progress-bar">
            <div class="generating-progress-fill" id="progress-fill"></div>
        </div>
        <p class="generating-status" id="generating-status">Searching the web for sources...</p>
    </div>
</div>

<script>
(function() {
    var stages = [
        { pct: 15, text: "Searching the web for sources...", delay: 0 },
        { pct: 35, text: "Reading and analyzing sources...", delay: 2500 },
        { pct: 55, text: "Writing the article...", delay: 5000 },
        { pct: 75, text: "Adding structure and citations...", delay: 9000 },
        { pct: 88, text: "Generating embeddings...", delay: 14000 },
        { pct: 95, text: "Almost ready...", delay: 18000 },
    ];

    var fill = document.getElementById('progress-fill');
    var status = document.getElementById('generating-status');

    stages.forEach(function(stage) {
        setTimeout(function() {
            fill.style.width = stage.pct + '%';
            status.textContent = stage.text;
        }, stage.delay);
    });

    // Poll for completion
    var slug = "{{ slug }}";
    var pollInterval = setInterval(function() {
        fetch('/api/v1/topics/' + slug)
            .then(function(r) {
                if (r.ok) {
                    clearInterval(pollInterval);
                    fill.style.width = '100%';
                    status.textContent = 'Done! Redirecting...';
                    setTimeout(function() {
                        window.location.href = '/topic/' + slug;
                    }, 500);
                }
            })
            .catch(function() {});
    }, 2000);

    // Timeout after 90 seconds
    setTimeout(function() {
        clearInterval(pollInterval);
        status.textContent = 'Taking longer than expected. Redirecting...';
        window.location.href = '/topic/' + slug;
    }, 90000);
})();
</script>
{% endblock %}
