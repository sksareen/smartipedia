{% if results %}
<div class="search-results">
    {% for topic in results %}
    <a href="/topic/{{ topic.slug }}" class="search-result">
        <h3>{{ topic.title }}</h3>
        <p>{{ topic.summary or '' }}</p>
    </a>
    {% endfor %}
</div>
{% elif query %}
<div class="no-results">
    <p>No results for "{{ query }}"</p>
</div>
{% endif %}
