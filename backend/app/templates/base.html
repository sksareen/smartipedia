<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smartipedia{% endblock %}</title>
    <meta name="description" content="{% block description %}Open-source AI encyclopedia with emergent knowledge graphs{% endblock %}">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/smartipedia.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="cosmic-bg"></div>

    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="/" class="nav-logo">Smartipedia</a>
                <span class="version-badge">v0.2</span>
            </div>
            <div class="nav-center">
                <button id="cmdk-trigger" class="nav-search-btn" title="Search (Cmd+K)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span class="nav-search-text">Search</span>
                    <kbd class="nav-search-kbd">&#8984;K</kbd>
                </button>
            </div>
            <div class="nav-right">
                <a href="/graph" class="nav-btn" title="Knowledge Graph">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="12" r="3"/><line x1="8.7" y1="7.5" x2="15.3" y2="10.5"/><line x1="8.7" y1="16.5" x2="15.3" y2="13.5"/></svg>
                </a>
                <a href="/search" class="nav-btn suggest-btn" title="Suggest a new article">
                    Suggest Article
                </a>
                <button id="text-size-toggle" class="nav-btn" title="Text size">A</button>
                <button id="theme-toggle" class="nav-btn" title="Toggle dark mode (Cmd+I)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Cmd+K Search Modal -->
    <div id="cmdk-modal" class="cmdk-overlay" style="display:none">
        <div class="cmdk-dialog">
            <div class="cmdk-input-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="cmdk-input" type="text" placeholder="Search topics or generate new..."
                       hx-get="/api/quick-search" hx-trigger="keyup changed delay:200ms"
                       hx-target="#cmdk-results" hx-swap="innerHTML"
                       name="q" autocomplete="off" autofocus>
                <kbd class="cmdk-esc">esc</kbd>
            </div>
            <div id="cmdk-results" class="cmdk-results"></div>
            <div class="cmdk-footer">
                <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
                <span><kbd>&#9166;</kbd> open</span>
                <span><kbd>esc</kbd> close</span>
            </div>
        </div>
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <a href="https://github.com/savarsareen/smartipedia">Open Source</a>
            <span class="footer-sep">&middot;</span>
            <a href="/api/docs">API Docs</a>
            <span class="footer-sep">&middot;</span>
            <a href="/api/openapi.json">OpenAPI Spec</a>
            <span class="footer-sep">&middot;</span>
            <a href="https://github.com/savarsareen/smartipedia/blob/main/LICENSE">MIT License</a>
        </div>
    </footer>
</body>
</html>
